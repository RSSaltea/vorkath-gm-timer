<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solak GM — Completed</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0e;
      color: #dde1e7;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.4;
      display: flex;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 420px;
      margin: 24px auto;
      background: #0f0f14;
      border: 1px solid #26263a;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid #26263a;
      margin-bottom: 12px;
    }
    .title {
      font-size: 17px;
      font-weight: 600;
      color: #e6dcd0;
    }
    .count {
      font-size: 12px;
      color: #6e7380;
    }
    .game-switch { position: relative; margin-bottom: 10px; display: inline-block; }
    .vgt-hamburger {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      width: 28px;
      height: 28px;
      background: #16161f;
      border: 1px solid #26263a;
      border-radius: 4px;
      cursor: pointer;
      padding: 5px 6px;
    }
    .vgt-hamburger span { display: block; height: 2px; background: #9aa0a6; border-radius: 1px; transition: background 0.15s; }
    .vgt-hamburger:hover span { background: #27ae60; }
    .vgt-game-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: #16161f;
      border: 1px solid #26263a;
      border-radius: 6px;
      overflow: hidden;
      z-index: 200;
      min-width: 90px;
    }
    .vgt-game-dropdown.open { display: block; }
    .vgt-dropdown-item {
      display: block;
      padding: 7px 14px;
      font-size: 12px;
      color: #9aa0a6;
      text-decoration: none;
      white-space: nowrap;
    }
    .vgt-dropdown-item:hover { background: #1e1e2a; color: #dde1e7; }
    .vgt-dropdown-item.active { color: #27ae60; font-weight: 600; }
    .search-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px;
      background: #16161f;
      border: 1px solid #26263a;
      border-radius: 5px;
      color: #dde1e7;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .search-input:focus {
      border-color: #27ae60;
    }
    .search-input::placeholder {
      color: #6e7380;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: calc(100vh - 180px);
      overflow-y: auto;
    }
    .list::-webkit-scrollbar { width: 6px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: #26263a; border-radius: 3px; }
    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #16161f;
      border-radius: 5px;
      font-size: 13px;
    }
    .item-num {
      color: #6e7380;
      font-size: 11px;
      min-width: 28px;
    }
    .item-name {
      color: #dde1e7;
    }
    .loading {
      text-align: center;
      color: #6e7380;
      padding: 20px;
    }
    .no-results {
      text-align: center;
      color: #6e7380;
      padding: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">Solak GM — Completed Kills</div>
    </div>
    <div class="game-switch">
      <button class="vgt-hamburger" id="vgt-hamburger" aria-label="Switch game">
        <span></span><span></span><span></span>
      </button>
      <div class="vgt-game-dropdown" id="vgt-game-dropdown">
        <a class="vgt-dropdown-item" href="completed.html">Vorkath</a>
        <a class="vgt-dropdown-item active" href="completedsolak.html">Solak</a>
        <a class="vgt-dropdown-item" href="completedaod.html">AoD</a>
      </div>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="search" type="text" placeholder="Search names..." autocomplete="off" spellcheck="false" />
    </div>
    <div class="list" id="list">
      <div class="loading">Loading completed list...</div>
    </div>
  </div>
  <script>
    var SUPABASE_URL = 'https://gogwmrnsofnqkjjxyskt.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvZ3dtcm5zb2ZucWtqanh5c2t0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjE1OTcsImV4cCI6MjA4NzkzNzU5N30.Pw__3qey7A9dV2hjzei-9VNUY4Jc7unVFUGgU-3nTdk';
    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var completedData = [];

    async function fetchCompleted() {
      try {
        var result = await sb.from('solak_completed').select('name').order('completed_at', { ascending: false });
        if (result.error) throw result.error;
        completedData = result.data ? result.data.map(function(r) { return r.name; }) : [];
        renderList('');
      } catch (err) {
        document.getElementById('list').innerHTML = '<div class="loading">Failed to load.</div>';
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderList(filter) {
      var listEl = document.getElementById('list');
      var filtered = completedData;
      if (filter) {
        var f = filter.toLowerCase();
        filtered = completedData.filter(function(n) { return n.toLowerCase().indexOf(f) !== -1; });
      }
      if (filtered.length === 0) {
        listEl.innerHTML = '<div class="no-results">No results</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        html += '<div class="item"><span class="item-num">' + (i + 1) + '.</span><span class="item-name">' + escapeHtml(filtered[i]) + '</span></div>';
      }
      listEl.innerHTML = html;
    }

    document.getElementById('search').addEventListener('input', function() {
      renderList(this.value.trim());
    });

    fetchCompleted();

    sb.channel('solak-completed-page')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'solak_completed' }, function() { fetchCompleted(); })
      .subscribe();

    (function() {
      var btn = document.getElementById('vgt-hamburger');
      var dd = document.getElementById('vgt-game-dropdown');
      if (btn && dd) {
        btn.addEventListener('click', function(e) { e.stopPropagation(); dd.classList.toggle('open'); });
        document.addEventListener('click', function() { dd.classList.remove('open'); });
      }
    })();
  </script>
</body>
</html>
